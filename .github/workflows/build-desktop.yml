name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend dist to backend
        run: |
          if (Test-Path backend/frontend_dist) { Remove-Item -Recurse -Force backend/frontend_dist }
          Copy-Item -Recurse frontend/dist backend/frontend_dist

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller --clean GearSystem.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GearSystem-windows
          path: backend/dist/GearSystem.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend dist to backend
        run: |
          rm -rf backend/frontend_dist
          cp -r frontend/dist backend/frontend_dist

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller --clean GearSystem.spec

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: GearSystem-linux
          path: backend/dist/GearSystem

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: GearSystem-windows
          path: release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: GearSystem-linux
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/GearSystem.exe
            release/GearSystem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
